name: Release

on:
  push:
    tags:
      - "v*"           # trigger on: git tag v0.1.0 && git push --tags
  workflow_dispatch:   # manual trigger from GitHub UI

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: spokec.exe
            asset: spokec-windows.exe

          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: spokec
            asset: spokec-linux

          - name: macOS
            os: macos-latest
            target: x86_64-apple-darwin
            binary: spokec
            asset: spokec-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          copy target\${{ matrix.target }}\release\${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            spokec-windows.exe/spokec-windows.exe
            spokec-linux/spokec-linux
            spokec-macos/spokec-macos
          body: |
            ## Spoke Compiler ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |---|---|
            | Windows | `spokec-windows.exe` |
            | Linux   | `spokec-linux` |
            | macOS   | `spokec-macos` |

            ### Usage
            ```
            spokec build myapp.spoke --target web
            spokec check myapp.spoke
            spokec debug plan myapp.spoke
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
